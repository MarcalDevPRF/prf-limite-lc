<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PRF - Limite de Servidores em LC</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        :root { --prf-azul: #002C5F; --prf-amarelo: #FFD700; --prf-bg: #f4f7f6; --danger: #d32f2f; --success: #2e7d32; }
        body { font-family: 'Roboto', sans-serif; margin: 0; background-color: var(--prf-bg); padding-top: 20px; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: var(--prf-azul); font-size: 14px; border-left: 5px solid var(--prf-amarelo); padding-left: 10px; text-transform: uppercase; margin-bottom: 20px; }
        
        .upload-box { border: 2px dashed var(--prf-azul); padding: 30px; text-align: center; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-bottom: 20px; background: #fff; }
        .upload-box:hover { background: #eef2f7; }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        label { display: block; font-weight: bold; font-size: 11px; color: #555; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 13px; }
        
        .btn-analisar { width: 100%; background: var(--prf-azul); color: white; padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 20px; }
        .btn-analisar:disabled { background: #ccc; }

        #statusMsg { margin-top: 15px; padding: 15px; border-radius: 5px; display: none; text-align: center; font-weight: bold; font-size: 13px; }
        .msg-sucesso { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .msg-erro { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Passo 1: Carregar Requerimento SEI</h2>
        <div class="upload-box" onclick="document.getElementById('pdfFile').click()">
            <strong style="color: var(--prf-azul);">📁 Clique aqui para fazer upload do PDF</strong>
            <p style="font-size: 12px; color: #666;">Os dados serão extraídos automaticamente</p>
            <input type="file" id="pdfFile" accept=".pdf" style="display:none;" onchange="handleUpload(this)">
        </div>
    </div>

    <div class="card">
        <h2>Passo 2: Conferir e Validar Dados</h2>
        <div class="form-grid">
            <div><label>Nome do Servidor</label><input type="text" id="nome"></div>
            <div><label>Matrícula</label><input type="text" id="matricula"></div>
            <div><label>Processo SEI</label><input type="text" id="processo"></div>
            <div>
                <label>Unidade (UPAG)</label>
                <select id="unidade">
                    <option value="SK9">SERVIÇO DE OPERAÇÕES COM CÃES - SK9</option>
                    <option value="SPRF-RJ">SPRF-RJ</option>
                    <option value="SPRF-DF">SPRF-DF</option>
                </select>
            </div>
            <div><label>Início (dd/mm/aaaa)</label><input type="text" id="inicio" placeholder="00/00/0000"></div>
            <div><label>Fim (dd/mm/aaaa)</label><input type="text" id="fim" placeholder="00/00/0000"></div>
            <div><label>Efetivo Atual da Unidade</label><input type="number" id="efetivo" value="40"></div>
        </div>

        <button class="btn-analisar" id="btnSalvar" onclick="validarESalvar()">Validar e Salvar no Banco Online</button>
        <div id="statusMsg"></div>
    </div>
</div>

<script>
    // ALTERE ESTA URL PARA A URL DO SEU RENDER
    const API_URL = "https://SUA-URL-NO-RENDER.onrender.com";

    async function handleUpload(input) {
        if (!input.files[0]) return;
        
        const msg = document.getElementById('statusMsg');
        msg.style.display = "block";
        msg.className = "status-header";
        msg.style.background = "#eef2f7";
        msg.innerText = "⏳ Extraindo dados do PDF...";

        const formData = new FormData();
        formData.append('file', input.files[0]);

        try {
            const response = await fetch(`${API_URL}/upload_pdf`, {
                method: 'POST',
                body: formData
            });
            const dados = await response.json();

            // Preenchimento dos campos (editáveis)
            document.getElementById('nome').value = dados.nome || '';
            document.getElementById('matricula').value = dados.matricula || '';
            document.getElementById('processo').value = dados.processo || '';
            document.getElementById('inicio').value = dados.inicio || '';
            document.getElementById('fim').value = dados.fim || '';
            
            msg.innerText = "✅ Dados extraídos! Confira antes de salvar.";
            setTimeout(() => msg.style.display = "none", 3000);
        } catch (error) {
            alert("Erro ao conectar com o servidor no Render.");
        }
    }

    async function validarESalvar() {
        const btn = document.getElementById('btnSalvar');
        const msg = document.getElementById('statusMsg');
        
        const payload = {
            nome: document.getElementById('nome').value,
            processo: document.getElementById('processo').value,
            matricula: document.getElementById('matricula').value,
            inicio: document.getElementById('inicio').value,
            fim: document.getElementById('fim').value,
            unidade: document.getElementById('unidade').value,
            efetivo: document.getElementById('efetivo').value
        };

        if (!payload.inicio || !payload.fim || !payload.efetivo) {
            alert("Por favor, preencha as datas e o efetivo.");
            return;
        }

        btn.disabled = true;
        msg.style.display = "block";
        msg.className = "status-header";
        msg.style.background = "#eef2f7";
        msg.innerText = "🔍 Verificando limite de 5% e salvando...";

        try {
            const response = await fetch(`${API_URL}/validar_e_salvar`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (response.ok) {
                msg.className = "msg-sucesso";
                msg.innerText = "✔️ " + result.mensagem;
            } else {
                msg.className = "msg-erro";
                msg.innerText = "❌ " + result.mensagem;
            }
        } catch (error) {
            msg.className = "msg-erro";
            msg.innerText = "Erro ao salvar no banco online.";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
